worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    client_max_body_size 20M;

    log_format main '$remote_addr - [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     'upstream=$upstream_addr rt=$request_time';

    access_log /dev/stdout main;
    error_log  /dev/stderr;

    # Three fixed web replicas (web1/web2/web3), all built from the same
    # image, matching the architecture diagram. Listed explicitly because
    # plain nginx upstreams only resolve a hostname once at startup, so
    # they can't safely follow Docker's `--scale` DNS round robin.
    upstream drgekspedisi_web {
        least_conn;
        server web1:80 max_fails=3 fail_timeout=10s;
        server web2:80 max_fails=3 fail_timeout=10s;
        server web3:80 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://drgekspedisi_web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;
        }

        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
